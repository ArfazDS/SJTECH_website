<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printos</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 122.26 150.6'%3E%3Cpath fill='%232D9ED8' d='M122.26,61.13c0,33.76-27.37,61.13-61.13,61.13-7.42,0-14.54-1.32-21.12-3.75v-57.38c0-11.65,9.47-21.13,21.12-21.13s21.13,9.48,21.13,21.13-9.48,21.13-21.13,21.13c-4.53,0-8.73-1.43-12.17-3.88v22.04c3.85,1.2,7.93,1.84,12.17,1.84,22.68,0,41.13-18.45,41.13-41.13s-18.45-41.13-41.13-41.13S20.01,38.45,20.01,61.13v45.23C7.72,95.18,0,79.06,0,61.13,0,27.37,27.37,0,61.13,0s61.13,27.37,61.13,61.13Z'/%3E%3Cpolygon fill='%232D9ED8' points='20.01 106.36 40.01 118.51 40.01 150.6 20.01 150.6 20.01 106.36'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#2D9ED8', dark: '#1e7eb0', light: '#f0f8fc', muted: '#8cbcd6' },
                        dark: '#0f172a'
                    },
                    boxShadow: {
                        'elegant': '0 20px 40px -15px rgba(0,0,0,0.05)',
                        'elegant-hover': '0 30px 60px -15px rgba(45,158,216,0.15)',
                        'mega-menu': '0 10px 30px -10px rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fafafa;
            color: #0f172a;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            font-size: 24px;
            line-height: 1;
        }

        .star-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2D9ED8;
        }

        .hover-lift {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        .hover-lift:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px -15px rgba(45, 158, 216, 0.2);
        }

        .image-parallax-container {
            overflow: hidden;
            position: relative;
        }

        .image-parallax-inner {
            position: absolute;
            top: -10%;
            left: 0;
            width: 100%;
            height: 120%;
            object-fit: cover;
            will-change: transform;
        }

        .parallax-aspect-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 133%;
        }

        .reveal-text {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
        }

        .reveal-text>* {
            transform: translateY(100%);
            opacity: 0;
            display: inline-block;
            will-change: transform;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            will-change: transform, opacity;
        }

        @keyframes blink {

            0%,
            90%,
            100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(0.1);
            }
        }

        @keyframes breathe {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .animate-blink {
            animation: blink 5s infinite;
        }

        .animate-breathe {
            animation: breathe 4s ease-in-out infinite;
        }

        .pupil {
            transition: transform 0.1s ease-out;
        }

        .blush {
            transition: all 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mega-menu-panel {
            animation: slideDown 0.2s ease-out;
        }

        /* CMYK Animated Background Blobs */
        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(40px, -60px) scale(1.1);
            }

            66% {
                transform: translate(-30px, 30px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 12s infinite alternate ease-in-out;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Infinite Marquee */
        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: scroll-left 40s linear infinite;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        /* Floating 3D/Cartoon Art Animations */
        @keyframes float-1 {

            0%,
            100% {
                transform: translateY(0px) rotate(-4deg);
            }

            50% {
                transform: translateY(-25px) rotate(4deg);
            }
        }

        @keyframes float-2 {

            0%,
            100% {
                transform: translateY(0px) rotate(5deg);
            }

            50% {
                transform: translateY(-20px) rotate(-5deg);
            }
        }

        @keyframes float-3 {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-15px) scale(1.05);
            }
        }

        .anim-float-1 {
            animation: float-1 6s ease-in-out infinite;
        }

        .anim-float-2 {
            animation: float-2 7s ease-in-out infinite;
        }

        .anim-float-3 {
            animation: float-3 5s ease-in-out infinite;
        }

        /* Clay buttons */
        .clay-btn {
            background: #ffffff;
            box-shadow:
                4px 4px 10px rgba(166, 180, 200, 0.2),
                -4px -4px 10px rgba(255, 255, 255, 1),
                inset 1px 1px 2px rgba(255, 255, 255, 1),
                inset -1px -2px 4px rgba(166, 180, 200, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #3f3f46;
            font-weight: 700;
            white-space: nowrap;
            border-radius: 9999px;
            padding: 10px 24px;
            font-size: 14px;
        }

        .clay-btn:hover {
            background: #ffffff;
            box-shadow:
                0 0 20px rgba(45, 158, 216, 0.3),
                -4px -4px 10px rgba(255, 255, 255, 1),
                inset 1px 1px 2px rgba(255, 255, 255, 1),
                inset -1px -2px 4px rgba(45, 158, 216, 0.15);
            color: #2D9ED8;
            transform: translateY(-2px) scale(1.02);
        }

        /* Clay Panels for Cards */
        .clay-panel {
            background: #ffffff;
            box-shadow:
                6px 6px 16px rgba(166, 180, 200, 0.25),
                -6px -6px 16px rgba(255, 255, 255, 1),
                inset 2px 2px 4px rgba(255, 255, 255, 1),
                inset -2px -4px 6px rgba(166, 180, 200, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .clay-panel:hover {
            background: #f8fbff;
            box-shadow:
                0 15px 30px rgba(45, 158, 216, 0.2),
                -6px -6px 16px rgba(255, 255, 255, 1),
                inset 2px 2px 4px rgba(255, 255, 255, 1),
                inset -2px -4px 6px rgba(45, 158, 216, 0.15);
            transform: translateY(-5px);
            border-color: rgba(45, 158, 216, 0.3);
        }

        .clay-panel-brand {
            background: #2D9ED8;
            box-shadow:
                8px 8px 20px rgba(45, 158, 216, 0.4),
                -6px -6px 16px rgba(255, 255, 255, 0.9),
                inset 2px 2px 5px rgba(255, 255, 255, 0.5),
                inset -3px -5px 8px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .clay-panel-brand:hover {
            background: #35a8e4;
            box-shadow:
                0 20px 40px rgba(45, 158, 216, 0.5),
                -6px -6px 16px rgba(255, 255, 255, 0.9),
                inset 2px 2px 5px rgba(255, 255, 255, 0.5),
                inset -3px -5px 8px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .testimonial-swiper .swiper-pagination-bullet {
            background: #cbd5e1;
            opacity: 0.5;
        }

        .testimonial-swiper .swiper-pagination-bullet-active {
            background: #2D9ED8;
            opacity: 1;
        }

        /* Utility for true 3D nesting */
        .transform-style-3d {
            transform-style: preserve-3d;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect } = React;

        gsap.registerPlugin(ScrollTrigger);

        // ─── MEGA MENU DATA ───────────────────────────────────────────────────────
        const CATEGORY_NAMES = [
            "All Products", "Apparel", "Photo Gifts", "Stationery",
            "Packaging", "Signage", "Corporate Gifts", "Drinkware"
        ];

        const MEGA_MENU_DATA = {
            "Apparel": [{ title: "T-Shirts", links: ["Short Sleeve", "Long Sleeve", "V-Neck", "Performance"] }, { title: "Outerwear", links: ["Hoodies", "Jackets", "1/4 Zips", "Sweaters"] }, { title: "Headwear", links: ["Baseball Caps", "Beanies", "Visors"] }, { title: "Bags", links: ["Tote Bags", "Backpacks", "Duffels"] }],
            "Photo Gifts": [{ title: "Wall Art", links: ["Canvas Prints", "Metal Prints", "Acrylic", "Wood Prints"] }, { title: "Books & Calendars", links: ["Photo Books", "Wall Calendars", "Desk Calendars"] }, { title: "Home Decor", links: ["Custom Blankets", "Pillows", "Coasters"] }],
            "Stationery": [{ title: "Business Cards", links: ["Standard", "Premium", "Square", "Foil Accent"] }, { title: "Marketing", links: ["Flyers", "Postcards", "Brochures", "Rack Cards"] }, { title: "Office", links: ["Letterheads", "Envelopes", "Notepads", "Sticky Notes"] }],
            "Packaging": [{ title: "Boxes", links: ["Mailer Boxes", "Product Boxes", "Shipping Boxes"] }, { title: "Labels & Stickers", links: ["Roll Labels", "Sheet Stickers", "Die-Cut Stickers"] }, { title: "Supplies", links: ["Custom Tape", "Tissue Paper", "Poly Mailers"] }],
            "Signage": [{ title: "Banners", links: ["Vinyl Banners", "Retractable Banners", "Mesh Banners"] }, { title: "Signs", links: ["Yard Signs", "Aluminum Signs", "A-Frame Signs"] }, { title: "Decals", links: ["Window Decals", "Wall Decals", "Car Decals"] }],
            "Corporate Gifts": [{ title: "Tech", links: ["Power Banks", "USB Drives", "Speakers", "Earbuds"] }, { title: "Office Accessories", links: ["Pens", "Notebooks", "Padfolios", "Mouse Pads"] }, { title: "Awards", links: ["Glass Awards", "Acrylic Awards", "Plaques"] }],
            "Drinkware": [{ title: "Mugs", links: ["Ceramic Mugs", "Travel Mugs", "Campfire Mugs"] }, { title: "Bottles", links: ["Water Bottles", "Insulated Bottles", "Aluminium"] }, { title: "Tumblers", links: ["Stainless Steel", "Wine Tumblers", "Plastic Tumblers"] }]
        };
        MEGA_MENU_DATA["All Products"] = Object.keys(MEGA_MENU_DATA).map(k => ({ title: k, links: MEGA_MENU_DATA[k].map(s => s.title) }));

        const LOGO = ({ className = "w-9 h-9" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.26 150.6" className={className}>
                <path fill="currentColor" d="M122.26,61.13c0,33.76-27.37,61.13-61.13,61.13-7.42,0-14.54-1.32-21.12-3.75v-57.38c0-11.65,9.47-21.13,21.12-21.13s21.13,9.48,21.13,21.13-9.48,21.13-21.13,21.13c-4.53,0-8.73-1.43-12.17-3.88v22.04c3.85,1.2,7.93,1.84,12.17,1.84,22.68,0,41.13-18.45,41.13-41.13s-18.45-41.13-41.13-41.13S20.01,38.45,20.01,61.13v45.23C7.72,95.18,0,79.06,0,61.13,0,27.37,27.37,0,61.13,0s61.13,27.37,61.13,61.13Z" />
                <polygon fill="currentColor" points="20.01 106.36 40.01 118.51 40.01 150.6 20.01 150.6 20.01 106.36" />
            </svg>
        );

        // ─── SINGLE GSAP CONTEXT ──────────────────────────────────────────────────
        function useGlobalGSAPAnimations() {
            useLayoutEffect(() => {
                const raf = requestAnimationFrame(() => {
                    const ctx = gsap.context(() => {
                        gsap.utils.toArray('.fade-up').forEach(el => {
                            ScrollTrigger.create({
                                trigger: el, start: "top 85%", once: true,
                                onEnter: () => gsap.to(el, { y: 0, opacity: 1, duration: 1, ease: "power4.out" })
                            });
                        });
                        gsap.utils.toArray('.reveal-text').forEach(el => {
                            ScrollTrigger.create({
                                trigger: el, start: "top 85%", once: true,
                                onEnter: () => gsap.to(el.children, { y: 0, opacity: 1, duration: 1.2, stagger: 0.1, ease: "power4.out" })
                            });
                        });
                        const noMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
                        const isTouch = window.matchMedia('(hover:none)').matches;
                        if (!noMotion && !isTouch) {
                            gsap.utils.toArray('.image-parallax-container').forEach(container => {
                                const img = container.querySelector('.image-parallax-inner');
                                if (img) gsap.to(img, {
                                    yPercent: -15, ease: "none",
                                    scrollTrigger: { trigger: container, start: "top bottom", end: "bottom top", scrub: true }
                                });
                            });
                        }
                    });
                    return () => ctx.revert();
                });
                return () => cancelAnimationFrame(raf);
            }, []);
        }

        // ─── HEADER ───────────────────────────────────────────────────────────────
        function Header() {
            const [activeMenu, setActiveMenu] = useState(null);
            const tid = useRef(null);
            const enter = name => { clearTimeout(tid.current); setActiveMenu(name); };
            const leave = () => { tid.current = setTimeout(() => setActiveMenu(null), 150); };
            useEffect(() => () => clearTimeout(tid.current), []);

            return (
                <header className="sticky top-0 w-full z-50 bg-white shadow-sm flex flex-col" onMouseLeave={leave}>
                    <div className="border-b border-gray-100 relative z-20 bg-white">
                        <div className="max-w-[1600px] mx-auto px-6 lg:px-12 flex justify-between items-center py-4 tracking-tight">
                            <div className="flex items-center gap-2 cursor-pointer z-20 text-brand"><LOGO /><span className="text-2xl font-black tracking-normal text-dark">Printos</span></div>
                            <div className="hidden lg:flex flex-1 max-w-xl mx-8 relative z-20">
                                <input type="text" placeholder="Search products, materials, and more..."
                                    className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm font-medium px-5 py-2.5 rounded-full outline-none focus:border-brand transition-colors" />
                                <button className="absolute right-3 top-1/2 -translate-y-1/2 text-brand">
                                    <span className="material-symbols-rounded" style={{ fontSize: '20px' }}>search</span>
                                </button>
                            </div>
                            <div className="flex items-center gap-6 z-20">
                                <button className="flex flex-col items-center text-gray-700 hover:text-brand transition-colors" title="Help">
                                    <span className="material-symbols-rounded" style={{ fontSize: '28px' }}>help</span>
                                </button>
                                <button className="flex flex-col items-center text-gray-700 hover:text-brand transition-colors" title="Sign In">
                                    <span className="material-symbols-rounded" style={{ fontSize: '28px' }}>person</span>
                                </button>
                                <button className="flex flex-col items-center text-gray-700 hover:text-brand transition-colors relative" title="Cart">
                                    <span className="material-symbols-rounded" style={{ fontSize: '28px' }}>shopping_cart_checkout</span>
                                    <span className="absolute -top-1 -right-2 w-[18px] h-[18px] bg-brand text-white text-[9px] font-bold rounded-full flex items-center justify-center shadow-sm">0</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white relative z-20 hidden lg:block border-b border-gray-100">
                        <div className="max-w-[1600px] mx-auto px-6 lg:px-12">
                            <nav className="flex justify-center space-x-10">
                                {CATEGORY_NAMES.map(cat => (
                                    <button key={cat} onMouseEnter={() => enter(cat)}
                                        className={`py-3.5 text-[15px] font-semibold tracking-wide border-b-2 transition-all ${activeMenu === cat ? 'border-brand text-brand' : 'border-transparent text-gray-700 hover:text-brand'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>

                    {activeMenu && MEGA_MENU_DATA[activeMenu] && (
                        <div className="mega-menu-panel absolute left-0 right-0 w-full bg-white shadow-mega-menu border-b border-gray-200 z-10"
                            style={{ top: '100%' }} onMouseEnter={() => enter(activeMenu)}>
                            <div className="max-w-[1600px] mx-auto px-6 lg:px-12 py-10">
                                <div className={`grid gap-8 ${activeMenu === "All Products" ? 'grid-cols-4 lg:grid-cols-7' : 'grid-cols-2 lg:grid-cols-4'}`}>
                                    {MEGA_MENU_DATA[activeMenu].map((col, i) => (
                                        <div key={i} className="flex flex-col space-y-4">
                                            <h4 className="font-bold text-gray-900 border-b border-gray-100 pb-2 text-sm">{col.title}</h4>
                                            <ul className="space-y-3">
                                                {col.links.map((l, j) => (
                                                    <li key={j}><a href="#" className="text-gray-600 hover:text-brand text-sm transition-colors block">{l}</a></li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                    {activeMenu !== "All Products" && (
                                        <div className="col-span-1 lg:col-span-1 lg:col-start-4 hidden lg:block bg-brand-light rounded-xl overflow-hidden relative min-h-[180px]">
                                            <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?auto=format&fit=crop&w=400&q=80" alt="Promo"
                                                className="absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-50" loading="lazy" />
                                            <div className="relative z-10 p-6 flex flex-col justify-end h-full">
                                                <span className="bg-brand text-white text-[10px] uppercase font-bold tracking-widest px-2 py-1 rounded w-fit mb-2">Offer</span>
                                                <h5 className="font-bold text-dark text-lg mb-2">20% Off {activeMenu}</h5>
                                                <a href="#" className="text-brand font-semibold text-sm hover:underline flex items-center">
                                                    Shop Sale <span className="material-symbols-rounded ml-1" style={{ fontSize: '16px' }}>arrow_right_alt</span>
                                                </a>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </header>
            );
        }

        // ─── DATA ─────────────────────────────────────────────────────────────────
        const BUSINESS_NEEDS = [
            {
                id: 1,
                title: "Startups",
                desc: "Agile, cost-effective branding & essential prints.",
                shape: "sunny",
                image: "https://img.freepik.com/free-photo/startup-business-progress-strategy-enterprise_53876-127927.jpg?semt=ais_hybrid&w=740&q=80"
            },
            {
                id: 2,
                title: "Retail & E-commerce",
                desc: "Stunning packaging, tags, and promotional inserts.",
                shape: "clover",
                image: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 3,
                title: "Events & Exhibitions",
                desc: "High-impact banners, lanyards, and standees.",
                shape: "cookie",
                image: "https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 4,
                title: "Corporate Offices",
                desc: "Professional stationery and official branding.",
                shape: "square",
                image: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80"
            }
        ];

        const POPULAR_CATEGORIES = [
            { id: 1, title: "Apparel", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800&q=80" },
            { id: 2, title: "Stationery", image: "https://images.unsplash.com/photo-1586075010923-2dd4570fb338?auto=format&fit=crop&w=800&q=80" },

            ];

            useLayoutEffect(() => {
                let ctx = gsap.context(() => {
                    const tl = gsap.timeline({ delay: 0.2 });

                    // 1. Entrance Animations
                    tl.from(".hero-text-anim", {
                        y: 30, opacity: 0, duration: 1, stagger: 0.15, ease: "power3.out"
                    });

                    tl.from(printerRef.current, {
                        y: 60, opacity: 0, duration: 1.2, ease: "back.out(1.2)"
                    }, "-=0.8");

                    // 2. Ultra-Realistic Sequential Printout Effect
                    requestAnimationFrame(() => {
                        if (!printerSlotRef.current) return;
                        const slotRect = printerSlotRef.current.getBoundingClientRect();

                        // PRE-CALCULATE POSITIONS (Done before any GSAP mutations to prevent layout shift bugs)
                        const cardData = cardsRef.current.map(card => {
                            if (!card) return null;
                            const rect = card.getBoundingClientRect();
                            return {
                                card,
                                startX: (slotRect.left + slotRect.width / 2) - (rect.left + rect.width / 2),
                                // Pin the exact bottom edge of the card to the printer slot center
                                startY: (slotRect.top + slotRect.height / 2) - rect.bottom
                            };
                        }).filter(Boolean);

                        cardData.forEach((data, i) => {
                            const { card, startX, startY } = data;

                            // SETUP: Hidden completely flat exactly at the slot line
                            gsap.set(card, {
                                x: startX,
                                y: startY + 5, // Slightly recessed
                                scale: 0.35,   // Shrink to fit the slot width
                                opacity: 1,    // Must be 1 so clipPath reveal works
                                rotationX: 45, // Tilted back inside the paper feed
                                transformOrigin: "bottom center",
                                clipPath: "inset(100% 0% 0% 0%)" // 100% Hidden from the top down!
                            });

                            // STRICT ORDER: Rapid sequence. The entire process takes ~1.5 seconds.
                            // Stagger starts every 0.1 seconds.
                            const printStart = 0.3 + (i * 0.1);

                            // Micro-interaction: Printer vibrates & LED flashes during data processing
                            tl.to(printerRef.current, {
                                y: "+=1.5",
                                duration: 0.03,
                                repeat: 5,
                                yoyo: true
                            }, printStart);
                            tl.to(ledRef.current, { opacity: 1, duration: 0.03, repeat: 5, yoyo: true }, printStart);

                            // STAGE 1: REALISTIC PRINTOUT (Extrusion) - Much faster
                            tl.to(card, {
                                clipPath: "inset(0% 0% 0% 0%)", // Unmask from bottom to top line-by-line
                                y: startY - 20,                 // Paper quickly pushes upward/forward
                                duration: 0.2,
                                ease: "none"                    // Steady mechanical printer speed
                            }, printStart);

                            // STAGE 2: GLIDE TO POSITION - Much faster
                            tl.to(card, {
                                x: 0,
                                y: 0,
                                rotationX: 0,
                                scale: 1,
                                duration: 0.4,
                                ease: "power2.out"
                            }, printStart + 0.2); // Hop exactly when printing finishes

                            // Natural aerodynamic tilt as paper moves through the air
                            tl.to(card, {
                                rotationZ: (i % 2 === 0 ? 3 : -3),
                                duration: 0.2,
                                ease: "power1.out"
                            }, printStart + 0.2);

                            tl.to(card, {
                                rotationZ: 0,
                                duration: 0.2,
                                ease: "power1.inOut"
                            }, printStart + 0.4);
                        });
                    });

                }, containerRef);

        // Dynamic Shape Card Component for Morphing
        function ShapeCard({ item, index }) {
            const [isHovered, setIsHovered] = useState(false);

            // Generates an SVG path with exactly 120 points (L commands)
            // Having matching vertex counts allows CSS to seamlessly morph the path
            const path = React.useMemo(() => {
                const type = isHovered ? 'circle' : item.shape;
                let p = "";
                for (let i = 0; i < 360; i += 3) {
                    const rad = i * Math.PI / 180;
                    let r = 50;

                    if (type === 'sunny') {
                        r = 45 + 5 * Math.cos(8 * rad); // 8 wavy points
                    } else if (type === 'clover') {
                        r = 42 + 8 * Math.cos(4 * rad); // 4 deep petals
                    } else if (type === 'cookie') {
                        r = 47 + 3 * Math.cos(12 * rad); // 12 scalloped edges
                    } else if (type === 'square') {
                        const cos = Math.abs(Math.cos(rad));
                        const sin = Math.abs(Math.sin(rad));
                        // m=5 power creates a perfect soft squircle
                        r = 48 / Math.pow(Math.pow(cos, 5) + Math.pow(sin, 5), 1 / 5);
                    } else if (type === 'circle') {
                        r = 48; // Target morphed circle radius
                    }

                    const x = 50 + r * Math.sin(rad);
                    const y = 50 - r * Math.cos(rad);

                    if (i === 0) p += `M ${x.toFixed(3)} ${y.toFixed(3)} `;
                    else p += `L ${x.toFixed(3)} ${y.toFixed(3)} `;
                }
                return p + "Z";
            }, [isHovered, item.shape]);

            return (
                <div
                    className="fade-up flex flex-col items-center group cursor-pointer"
                    style={{ transitionDelay: `${index * 50}ms` }}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    {/* SVG Image Mask & Morphing Path */}
                    <svg
                        viewBox="0 0 100 100"
                        className="w-full max-w-[240px] drop-shadow-[0_15px_25px_rgba(0,0,0,0.1)] group-hover:drop-shadow-[0_20px_35px_rgba(45,158,216,0.25)] transition-all duration-500 transform group-hover:-translate-y-3"
                        preserveAspectRatio="xMidYMid meet"
                        style={{ overflow: 'visible' }}
                    >
                        <defs>
                            <pattern id={`img-pattern-${item.id}`} patternUnits="userSpaceOnUse" width="100" height="100">
                                <image
                                    href={item.image}
                                    x="0" y="0"
                                    width="100" height="100"
                                    preserveAspectRatio="xMidYMid slice"
                                    style={{
                                        transition: 'transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)',
                                        transformOrigin: '50px 50px',
                                        transform: isHovered ? 'scale(1.15)' : 'scale(1)'
                                    }}
                                />
                            </pattern>
                        </defs>

                        <path
                            d={path}
                            fill={`url(#img-pattern-${item.id})`}
                            style={{ transition: 'd 0.5s cubic-bezier(0.4, 0, 0.2, 1)' }}
                        />
                    </svg>

                    {/* Standalone Text Below */}
                    <div className="mt-8 text-center px-4">
                        <h3 className="text-xl md:text-2xl font-bold text-dark group-hover:text-brand transition-colors">
                            {item.title}
                        </h3>
                    </div>
                </div>
            );
        }

        // Dynamic Morphing Card Component for Popular Categories (Out-of-the-box shapes)
        function CategoryMorphCard({ cat, index }) {
            const [isHovered, setIsHovered] = useState(false);
            // Array of unique "out of the box" shapes
            const shapes = ['blob', 'triangle', 'star', 'hexagon'];
            const baseShape = shapes[index % 4];

            const path = React.useMemo(() => {
                const type = isHovered ? 'squircle' : baseShape;
                let p = "";
                // 120 points to ensure smooth CSS morphing
                for (let i = 0; i < 360; i += 3) {
                    const rad = i * Math.PI / 180;
                    let r = 50;

                    if (type === 'blob') {
                        // Organic, asymmetric fluid blob
                        r = 43 + 4 * Math.cos(3 * rad) + 3 * Math.sin(2 * rad);
                    } else if (type === 'triangle') {
                        // Soft Reuleaux triangle pointing upwards
                        r = 42 + 6 * Math.cos(3 * rad);
                    } else if (type === 'star') {
                        // Plump, soft 5-pointed star
                        r = 43 + 6 * Math.cos(5 * rad);
                    } else if (type === 'hexagon') {
                        // Smooth, modern honeycomb hexagon
                        r = 45 + 3 * Math.cos(6 * rad);
                    } else if (type === 'squircle') {
                        // Target soft rounded square
                        const cos = Math.abs(Math.cos(rad));
                        const sin = Math.abs(Math.sin(rad));
                        r = 48 / Math.pow(Math.pow(cos, 5) + Math.pow(sin, 5), 1 / 5);
                    }

                    // Convert polar to cartesian coordinates
                    const x = 50 + r * Math.sin(rad);
                    const y = 50 - r * Math.cos(rad);

                    if (i === 0) p += `M ${x.toFixed(3)} ${y.toFixed(3)} `;
                    else p += `L ${x.toFixed(3)} ${y.toFixed(3)} `;
                }
                return p + "Z";
            }, [isHovered, baseShape]);

            return (
                <div
                    className="fade-up group cursor-pointer flex flex-col items-center"
                    style={{ transitionDelay: `${index * 50}ms` }}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}

                        preserveAspectRatio="xMidYMid meet"
                        style={{ overflow: 'visible' }}
                    >
                        <defs>
                            <pattern id={`cat-pattern-${cat.id}`} patternUnits="userSpaceOnUse" width="100" height="100">
                                <image
                                    href={cat.image}
                                    x="0" y="0"

                                    }}

                            </pattern>
